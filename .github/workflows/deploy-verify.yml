name: Deploy Verification

"on":
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  verify-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run regression guardian (source checks)
        run: |
          python scripts/regression_check.py
          echo "Regression guardian passed — source code is clean"

      - name: Install smoke test dependency
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Wait for Railway deployment
        run: |
          echo "Waiting 120 seconds for Railway deployment..."
          sleep 120

      - name: Run regression guardian (production checks)
        if: success()
        env:
          PROD_URL: https://web-production-900a7.up.railway.app
        run: |
          python scripts/regression_check.py --prod "$PROD_URL"
          echo "Production regression checks passed"

      - name: Run production smoke test
        env:
          PROD_URL: https://web-production-900a7.up.railway.app
        run: |
          python scripts/smoke_test.py --base-url "$PROD_URL"

      - name: Verify prompt catalog endpoint
        run: |
          python - <<'PY'
          import json
          import urllib.request

          url = "https://web-production-900a7.up.railway.app/api/prompts?catalog=classics"
          with urllib.request.urlopen(url, timeout=20) as response:
              payload = json.load(response)
          prompts = payload if isinstance(payload, list) else payload.get("prompts", [])
          print(f"Prompt catalog entries: {len(prompts)}")
          assert len(prompts) >= 5, "Too few prompts in production catalog"
          PY

      - name: Verify banned fragments are absent from app code
        run: |
          set -euo pipefail
          fail=0
          for pattern in \
            "circular vignette illustration" \
            "Mandatory output rules" \
            "full rectangular canvas"; do
            if git grep -n -F "$pattern" -- src/ >/tmp/banned.txt; then
              echo "Found banned fragment '$pattern' in app source:"
              cat /tmp/banned.txt
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "No banned fragments found in src/"

      - name: Verify negative prompt definition is wired
        run: |
          set -euo pipefail
          if ! grep -q "ALEXANDRIA_NEGATIVE_PROMPT" src/image_generator.py; then
            echo "ALEXANDRIA_NEGATIVE_PROMPT missing from src/image_generator.py"
            exit 1
          fi
          usage_count="$(grep -c "ALEXANDRIA_NEGATIVE_PROMPT" src/image_generator.py)"
          if [ "$usage_count" -lt 2 ]; then
            echo "ALEXANDRIA_NEGATIVE_PROMPT only referenced $usage_count time(s)"
            exit 1
          fi
          echo "ALEXANDRIA_NEGATIVE_PROMPT defined and referenced $usage_count times"
